<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBox Management Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="logo">NEO<span class="highlight">BOX</span></div>
        <div class="system-mini-stats">
            <div class="stat-item"><i class="fas fa-microchip"></i> <span id="cpu-mini">0%</span></div>
            <div class="stat-item"><i class="fas fa-thermometer-half"></i> <span id="temp-mini">0°C</span></div>
        </div>
        <nav>
            <button onclick="showSection('dashboard')" title="Dashboard"><i class="fas fa-tachometer-alt"></i></button>
            <button onclick="showSection('remote')" title="Remote Control"><i class="fas fa-gamepad"></i></button>
            <button onclick="showSection('terminal')" title="Terminal"><i class="fas fa-terminal"></i></button>
            <button onclick="showSection('files')" title="Files"><i class="fas fa-folder-open"></i></button>
        </nav>
    </header>

    <main>
        <!-- Dashboard Section -->
        <section id="dashboard-section" class="active">
            <div class="grid-layout">
                <div class="card stat-card">
                    <h3><i class="fas fa-microchip"></i> CPU Usage</h3>
                    <div class="gauge-container">
                        <div class="gauge-bar" id="cpu-bar" style="width: 0%"></div>
                        <span id="cpu-val">0%</span>
                    </div>
                </div>
                <div class="card stat-card">
                    <h3><i class="fas fa-memory"></i> RAM Usage</h3>
                    <div class="gauge-container">
                        <div class="gauge-bar" id="ram-bar" style="width: 0%"></div>
                        <span id="ram-val">0%</span>
                    </div>
                </div>
                <div class="card stat-card">
                    <h3><i class="fas fa-thermometer-half"></i> Temperature</h3>
                    <div class="stat-big"><span id="temp-val">0</span>°C</div>
                </div>
                <div class="card stat-card">
                    <h3><i class="fas fa-clock"></i> Uptime</h3>
                    <div class="stat-big" id="uptime-val">00:00:00</div>
                </div>
            </div>
        </section>

        <!-- Remote Section -->
        <section id="remote-section">
            <div class="remote-layout">
                <div class="dpad">
                    <button class="btn-d" id="btn-UP" onclick="sendAction('UP')"><i class="fas fa-caret-up"></i></button>
                    <button class="btn-d" id="btn-LEFT" onclick="sendAction('LEFT')"><i class="fas fa-caret-left"></i></button>
                    <button class="btn-d" id="btn-RIGHT" onclick="sendAction('RIGHT')"><i class="fas fa-caret-right"></i></button>
                    <button class="btn-d" id="btn-DOWN" onclick="sendAction('DOWN')"><i class="fas fa-caret-down"></i></button>
                </div>
                <div class="action-buttons">
                    <button class="btn-a color-a" onclick="sendAction('A')">A</button>
                    <button class="btn-a color-b" onclick="sendAction('B')">B</button>
                    <button class="btn-a color-x" onclick="sendAction('X')">X</button>
                    <button class="btn-a color-y" onclick="sendAction('Y')">Y</button>
                </div>
                <div class="meta-buttons">
                    <button onclick="sendAction('SELECT')">SELECT</button>
                    <button onclick="sendAction('START')">START</button>
                    <button onclick="sendAction('MENU')">MENU</button>
                    <button onclick="sendAction('EXIT')">EXIT</button>
                </div>
                <div class="shoulder-buttons">
                    <button onclick="sendAction('L')">L</button>
                    <button onclick="sendAction('R')">R</button>
                </div>
            </div>
        </section>

        <!-- Terminal Section -->
        <section id="terminal-section">
            <div id="terminal"></div>
        </section>

        <!-- Files Section -->
        <section id="files-section">
            <div class="files-layout">
                <div class="card upload-container">
                    <h3><i class="fas fa-upload"></i> Upload</h3>
                    <form id="upload-form">
                        <div class="input-group">
                            <label>Target:</label>
                            <select name="type" id="upload-type">
                                <option value="rom">PS1 ROM (~/roms/ps1)</option>
                                <option value="payload">Payload (payloads/custom/)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <input type="file" name="file" id="file-input">
                        </div>
                        <button type="submit" class="btn-primary">Upload File</button>
                    </form>
                    <div id="upload-status"></div>
                </div>

                <div class="card file-list-container">
                    <h3><i class="fas fa-list"></i> Managed Files</h3>
                    <div class="filter-tabs">
                        <button onclick="loadFiles('roms')" class="active" id="tab-roms">ROMs</button>
                        <button onclick="loadFiles('payloads')" id="tab-payloads">Payloads</button>
                    </div>
                    <ul id="file-list"></ul>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
